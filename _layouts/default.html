<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <meta
      name="description"
      content="{{ site.data.group.hero.summary | strip_html | normalize_whitespace | escape }}"
    >
    <link rel="icon" href="{{ 'images/favicon.ico' | relative_url }}" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="{{ 'assets/site.css' | relative_url }}">
  </head>
  <body>
    {{ content }}
  </body>
</html>
